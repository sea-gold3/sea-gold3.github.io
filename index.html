<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no" />  
    <title>贪吃蛇</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
        }
        #div0{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        #div1{
            position: relative;
            top: 210px;
            width: 800px;
            height: 800px;
            background-color: #5a5a5abd;
            border: 20px solid rgb(27, 27, 27);
            box-shadow: inset  -6px -6px 5px rgba(0, 0, 0, 0.2),inset  6px 6px 5px rgba(0, 0, 0, 0.2),inset  6px -6px 5px rgba(0, 0, 0, 0.2),inset  -6px 6px 5px rgba(0, 0, 0, 0.2);
            margin-bottom: 50px;
        }
        #div2{
            position: absolute;
            top: 50px;
            width: 80%;
            height: 150px;

        }
        #div3{
            position: absolute;
            top: 58%;
            width: 73%;
            padding-top: 73%;
  
        
        }

        .divh{
            width: 50px;
            height: 50px;
            background-color: #ad6244;
            border-radius:20px;
        }
        .divs{
            width: 50px;
            height: 50px;
            background-color: #bbc74d;
            border-radius:20px;
        }
        .divf{
            width: 50px;
            height: 50px;
            background-color: #1714d6;
        }

        button{
            height: 30%;
            width: 30%;
            margin: 10px;
            font-size: 180px;
            color: beige;
            background-color: rgba(184, 9, 9, 0.822);
            box-shadow: -6px -6px 5px rgba(0, 0, 0, 0.5),6px 6px 5px rgba(0, 0, 0, 0.5),6px -6px 5px rgba(0, 0, 0, 0.5),-6px 6px 5px rgba(0, 0, 0, 0.5);
        }
        button:active{
            box-shadow: inset  -6px -6px 5px rgba(0, 0, 0, 0.5),inset  6px 6px 5px rgba(0, 0, 0, 0.5),inset  6px -6px 5px rgba(0, 0, 0, 0.5),inset  -6px 6px 5px rgba(0, 0, 0, 0.5);
        }
        #b1{
            position: absolute;
            top: 34%;
            left: 34%;
        }
        #b2{
            position: absolute;
            top: 0px;
            left: 34%;
            transform:rotate(90deg);
        }
        #b3{
            position: absolute;
            bottom: 0px;
            left: 34%;
            transform:rotate(90deg);
        }
        #b4{
            position: absolute;
            top: 34%;
            left: 0px;
        }
        #b5{
            position: absolute;
            top: 34%;
            right: 0px;
        }
        h1{
            font-size: 58px;
        }
        #divz{
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(45, 48, 48, 0.473);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btt{
            position: absolute;
            width: 700px;
            height: 300px;
            font-size: 100px;
            color: rgb(0, 0, 0);
            background-color: rgb(255, 255, 255);
        }
        #btt1{
            top: 600px;
        }
        #btt2{
            top: 1000px;
        }
        #btt3{
            top: 1400px;
        }
        body{
            background-color: rgb(224, 222, 222);
        }
    </style>
</head>
<body>
    <div id="divz">
        <button onclick="game(750)" class="btt" id="btt1">开始游戏-简单</button>
        <button onclick="game(500)" class="btt" id="btt2">开始游戏-普通</button>
        <button onclick="game(280)" class="btt" id="btt3">开始游戏-困难</button>
    </div>
    <div id="div0">
        <div id="div1"></div>
        <div id="div2">
            <h1 id="h1z"></h1>
        </div>
        <div id="div3">
            <button  id="b1" onclick="zanting()">O</button>
            <button onclick="up()" id="b2"><</button>
            <button onclick="dow()" id="b3">></button>
            <button onclick="left()" id="b4"><</button>
            <button onclick="right()" id="b5">></button>
        </div>
    </div>
    
   
    
</body>

<script>
    //记录蛇头坐标
    var sankHnadPosition =[];
    //记录蛇身体坐标，二维数组
    var sankSenPosition =[];
    //记录蛇食物坐标
    var sankFoodPosition =[];
    //绑定贪吃蛇实例对象
    var ttp;
    //积分
    var ii =0;
    //计时器
    var times;
    var divz =document.getElementById("divz");
    var h1z =document.getElementById("h1z");
    var timeStar;
    var falg = true;
    var falg2 =true;
    var tcsMAX =JSON.parse(localStorage.getItem('tanchiseMAX')) || "无";
    h1z.innerHTML="最高分："+tcsMAX+"当前分："+ii;

    //游戏内dom构造函数
    function YuanSu(x,y,className){
        this.x =x;
        this.y =y;
        this.className =className;
        var newDiv = document.createElement("div");
        newDiv.classList.add(className);
        newDiv.style.position='absolute';
        newDiv.style.left =x*50+"px";
        newDiv.style.top=y*50+'px';
        var divZong =document.getElementById('div1');
        divZong.appendChild(newDiv);
    }

    //蛇头构造函数
    function sankHnad(x,y){
        new YuanSu(x,y,'divh');
        sankHnadPosition.length =0;
        sankHnadPosition.push(x);
        sankHnadPosition.push(y);
    }

    //蛇身构造函数
    function sankShen(x,y){
        new YuanSu(x,y,'divs');
    }
    
    //食物构造函数
    function sankFood(x,y){
        if(sankFoodPosition.length!=0){
            document.getElementsByClassName('divf')[0].remove();
        }
        new YuanSu(x,y,'divf');
        sankFoodPosition.length=0;
        sankFoodPosition.push(x);
        sankFoodPosition.push(y);
    }
    
    //蛇构造函数
    function sank(){
        new sankShen(1,0);
        sankSenPosition.push([1,0]);
        new sankShen(2,0);
        sankSenPosition.push([2,0]);
        new sankHnad(3,0);
        
        //移动方向变量
        this.direction ={
            left:{
                x:-1,
                y:0
            },
            right:{
                x:1,
                y:0
            },
            up:{
                x:0,
                y:-1
            },
            dow:{
                x:0,
                y:1
            }
        }

        //默认移动方向
        this.moveDirection=this.direction.right;
    }

    sank.prototype.delS=function (x,y){
        //判断是否越界
        if(x>15||x<0||y<0||y>15){
            return true;
        }
        //判断是否击中身体
        let endS =false;
        sankSenPosition.forEach(function(value){
            if(value[0]==x&&value[1]==y){
                endS= true;
            }
        })
        return endS;
    }

    sank.prototype.eatS=function (x,y){
        if(sankFoodPosition[0]==x&&sankFoodPosition[1]==y){
            //生成新食物
            ii++; 
            h1z.innerHTML="最高分："+tcsMAX+"当前分："+ii;
            let endS= true;
            let newX=Math.round(Math.random()*15);
            let newY=Math.round(Math.random()*15);
            //判断食物位置是否在蛇身上
            while(endS){
                sankSenPosition.forEach(function(value){
                    if(value[0]==newX&&value[1]== newY){
                        newX=Math.round(Math.random()*15);
                        newY=Math.round(Math.random()*15);
                    }
                    else{
                        new sankFood(newX,newY);
                        endS =false;
                    }    
                })
            }
            falg2=true; 
            return true;
        }
        else{
            falg2=true;
            return false;
        }
    }

    sank.prototype.goS=function (directionS){
        falg2=false;
        //读取sankHnadPosition确定旧蛇头位置
        let SHPositionOledX = sankHnadPosition[0];
        let SHPositionOledY = sankHnadPosition[1];

        //对旧蛇头坐标进行运算
        let SHPositionNewX = SHPositionOledX+directionS.x;
        let SHPositionNewY = SHPositionOledY+directionS.y;

        //计算新坐标是否违规，违规则调用del，结束游戏
        if(this.delS(SHPositionNewX,SHPositionNewY)){
            // 结束游戏
            ttp=null;
            clearInterval(times);
            console.log("结束");
            h1z.innerHTML="最高分："+tcsMAX+"当前分："+ii+"，游戏结束";
            if(ii>tcsMAX||tcsMAX=="无"){
                localStorage.setItem('tanchiseMAX',JSON.stringify(ii));
            }
            setTimeout(function(){
                location.reload();
            },800);
            
        }

        //删除旧蛇头dom
        document.getElementsByClassName('divh')[0].remove();

        //根据坐标生成新身体覆盖，并压入位置
        new sankShen(SHPositionOledX,SHPositionOledY);
        sankSenPosition.unshift([SHPositionOledX,SHPositionOledY]);

        //生成新蛇头dom,压入蛇头坐标
        new sankHnad(SHPositionNewX,SHPositionNewY);

        //判断是否触发eat
        if(!this.eatS(SHPositionNewX,SHPositionNewY)){
            //如未触发eat，删除最末尾蛇身dom及sankSenPosition最后一位坐标
            sankSenPosition.pop();
            let shen =document.getElementsByClassName('divs');
            shen[0].remove();
        }
        
    }

    //启动函数
    function game(timee){
        timeStar=timee;
        divz.style.display="none";
        ttp=new sank();
        new sankFood(5,0);
        times=setInterval(function(){
            ttp.goS(ttp.moveDirection)
        },timeStar);
    }

    //转向
    function right(){
        if(falg2&&ttp.moveDirection!=ttp.direction.left){
            ttp.moveDirection=ttp.direction.right;
        }
    }

    function left(){
        if(falg2&&ttp.moveDirection!=ttp.direction.right){
            ttp.moveDirection=ttp.direction.left;
        }
    }

    function up(){
        if(falg2&&ttp.moveDirection!=ttp.direction.dow){
            ttp.moveDirection=ttp.direction.up;
        }
    }

    function dow(){
        if(falg2&&ttp.moveDirection!=ttp.direction.up){
            ttp.moveDirection=ttp.direction.dow;
        }
    }

    function zanting(){
        if(falg){
            clearInterval(times);
            times=null;
            falg = false;
            h1z.innerHTML="最高分："+tcsMAX+"当前分："+ii+"，游戏暂停";
        }
        else{
            times=setInterval(function(){
                ttp.goS(ttp.moveDirection)
            },timeStar);
            falg = true;
            h1z.innerHTML="最高分："+tcsMAX+"当前分："+ii;
        }
    }
    
</script>
</html>
